<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dear Data, ETEC 531</title>
<style>
  :root{ color-scheme: light;
    --ink:#2b2622; --paper:#f6f1e7; --panel:#efe7d7; --line:#d8ccb5; --muted:#8a7f6d;
    --artwork:#b8742a; --most:#3f8f7d; --least:#d1553b; --place:#3b6ea5; --missing:#9b9384;
    --UNDERSTAND:#4a6d8c; --EXPOSE:#c76b2a; --RESIST:#b0413a; --RELATE:#2f8f7d; --IMAGINE:#7d5aa6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);background:var(--paper);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  header{padding:9px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;
    gap:12px;flex-wrap:wrap;background:var(--paper)}
  header h1{font-size:15px;margin:0;font-weight:650}
  header .status{font-size:11.5px;color:var(--muted)}
  .toolbar{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  button{font:inherit;font-size:12.5px;padding:5px 10px;border:1px solid var(--line);
    background:#fff;border-radius:7px;cursor:pointer;color:var(--ink)}
  button:hover{background:#fbf6ea}
  button.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;border-radius:0;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  main{flex:1;display:flex;min-height:0}
  #stage{flex:1;position:relative;min-width:0}
  .view{position:absolute;inset:0;display:none}
  .view.on{display:block}
  svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
  svg.grabbing{cursor:grabbing}
  aside{width:300px;border-left:1px solid var(--line);background:var(--panel);padding:13px;
    overflow-y:auto;font-size:13px}
  aside h2{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:15px 0 7px}
  aside h2:first-child{margin-top:0}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;margin:0 4px 6px 0;
    border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;font-size:11.5px;user-select:none}
  .chip.off{opacity:.35;text-decoration:line-through}
  .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .sw{width:11px;height:11px;border-radius:3px;flex:none;display:inline-block}
  #tooltip{position:absolute;pointer-events:none;background:#fffef9;border:1px solid var(--ink);
    border-radius:8px;padding:8px 10px;max-width:250px;font-size:12.5px;line-height:1.4;
    box-shadow:0 4px 14px rgba(0,0,0,.14);opacity:0;transition:opacity .08s;z-index:20}
  #tooltip .t-item{font-weight:650;margin-bottom:2px}
  #tooltip .t-sub{color:var(--muted);font-size:11.5px}
  #tooltip .t-why{font-style:italic;color:#4a4237;margin-top:4px}
  .legend-row{display:flex;align-items:center;gap:7px;margin:4px 0;font-size:12px}
  select{font:inherit;font-size:12.5px;padding:6px 8px;border:1px solid var(--line);border-radius:7px;width:100%;background:#fff;color:var(--ink);cursor:pointer}
  .detail .name{font-size:15px;font-weight:650;margin-bottom:2px}
  .detail .role{color:var(--muted);font-size:12px;margin-bottom:8px}
  .detail .pick{padding:6px 0;border-bottom:1px dashed var(--line);line-height:1.35}
  .detail .pick .lab{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .detail .pick .val{font-weight:600}
  .detail .pick .why{font-style:italic;color:#5a5142;font-size:12px}
  .namelist{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .tag{font-size:11.5px;padding:2px 7px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer}
  .bar{height:8px;border-radius:5px;display:flex;overflow:hidden;margin:6px 0 4px;border:1px solid var(--line)}
  .bar span{display:block;height:100%}
  .hint{color:var(--muted);font-size:12px;line-height:1.45}
  .center-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);padding:40px;font-size:14px}
  .clear{float:right;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline}
  #tourCard{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:390px;max-width:92%;
    background:#fffef9;border:1px solid var(--ink);border-radius:12px;padding:14px 16px;
    box-shadow:0 10px 30px rgba(0,0,0,.20);z-index:40}
  #tourCard.hidden{display:none}
  #tourCard .tc-step{font-size:10.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
  #tourCard .tc-title{font-size:15px;font-weight:650;margin:3px 0 6px}
  #tourCard .tc-body{font-size:13px;line-height:1.5;color:#3a342b}
  #tourCard .tc-body select{margin-top:8px;width:100%;max-width:100%}
  #tourCard .tc-think{margin-top:10px;padding-top:8px;border-top:1px dashed var(--line);font-size:12.5px;color:#6b5f4c;font-style:italic}
  #tourCard .tc-drag{cursor:move;user-select:none;text-align:center;color:var(--muted);font-size:12px;letter-spacing:3px;margin:-6px 0 4px;padding:2px;touch-action:none}
  #tourCard textarea.tour-note{width:100%;min-height:44px;margin-top:8px;border:1px solid var(--line);border-radius:7px;padding:7px;font:inherit;font-size:12.5px;background:#fff;resize:vertical}
  #tourCard .tc-btns{display:flex;gap:8px;align-items:center;margin-top:13px}
  #tourCard .tc-btns .sp{margin-right:auto}
  dialog#respondDlg{border:1px solid var(--ink);border-radius:14px;padding:0;max-width:560px;width:92%;max-height:90vh;overflow:auto;color:var(--ink);background:var(--paper)}
  .rd-qs{margin:6px 0 10px;padding-left:18px;color:#5a5142;font-size:12.5px;line-height:1.55}
  .rd-qs li{margin:3px 0}
  @media (max-width:760px){
    header{gap:8px;padding:8px 12px}
    header h1{font-size:14px}
    .toolbar{gap:6px;width:100%;margin-left:0}
    button{font-size:12px;padding:5px 9px}
    main{flex-direction:column}
    #stage{flex:none;height:56vh;min-height:300px}
    aside{width:100%;flex:1;min-height:0;border-left:none;border-top:1px solid var(--line)}
    #tourCard{width:94%;left:3%;right:auto;transform:none;bottom:10px}
    #tourCard.hidden{display:none}
  }
  dialog#respondDlg::backdrop{background:rgba(43,38,34,.45)}
  .rd-wrap{padding:18px 20px}
  .rd-wrap h3{margin:0 0 3px;font-size:17px}
  .rd-wrap p.sub{margin:0 0 10px;color:var(--muted);font-size:12.5px}
  .rd-q{font-weight:600;font-size:13px;margin:12px 0 4px}
  .rd-wrap textarea{width:100%;min-height:320px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;font-size:13px;line-height:1.5;background:#fff;resize:both}
  .rd-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
  .rd-out{width:100%;min-height:96px;margin-top:10px;border:1px dashed var(--line);border-radius:8px;padding:8px;font:inherit;font-size:12.5px;background:#faf6ec;white-space:pre-wrap}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Dear Data, ETEC 531</h1>
      <div class="status" id="status">Connecting…</div>
    </div>
    <div class="toolbar">
      <div class="seg" id="tabs">
        <button data-tab="network" class="active">Network</button>
        <button data-tab="places">Places</button>

      <button id="respondBtn">Respond</button>

      <button id="fitBtn">Fit</button>

  <main>
    <div id="stage">
      <div class="view on" id="view-network"><svg id="svgN"></svg></div>
      <div class="view" id="view-places"><svg id="svgM"></svg></div>
      <div id="tooltip"></div>
      <div class="center-msg" id="centerMsg">Reading the cohort sheet…</div>
    </div>
    <aside id="aside">
      <div id="studentPick">
        <h2>Jump to a student</h2>
        <select id="studentSelect"><option value="">— choose —</option></select>

        <h2>Legend</h2>
        <div id="legend"></div>

    </aside>
  </main>
</div>

<div id="tourCard" class="hidden">
  <div class="tc-drag" id="tcDrag" title="Drag to move">⠿⠿⠿</div>

  <div class="tc-title" id="tcTitle"></div>
  <div class="tc-body" id="tcBody"></div>
  <div class="tc-btns">
    <button id="tcClose" class="sp">Close</button>
    <button id="tcBack">Back</button>
    <button id="tcNext" class="active">Next</button>
  </div>
</div>
<dialog id="respondDlg"><div class="rd-wrap">

  <textarea id="rdMain"></textarea>
  <div class="rd-btns">
    <button id="rdCopy" class="active">Copy</button>
    <button id="rdDownload">Download .txt</button>
    <button id="rdClose">Close</button>
  </div>
</div></dialog>

let TITLES={};
function titleFor(item){const k=readingKey(item).toLowerCase();return TITLES[k]||readingDisplay(item);}

/* ---------- parsing ---------- */
function clean(s){return (s==null?"":String(s)).replace(/\\(?=[-.\d])/g,"").trim();}
// readings may be entered as "Author (Year)" or "Author (Year) — Title" (or with page refs).
// Key every reading on the "Author (Year)" prefix so short and titled forms merge into one node.
function readingKey(s){const m=s.match(/^(.*?\(\d{4}[a-z]?\))/);return (m?m[1]:s).trim();}
function readingDisplay(s){return s.replace(/,\s*(pp?\.|paras?\.|pg\.|page)\s*[\dxivlcm—\-,\s]+$/i,"").trim();}
function toType(t){t=t.toLowerCase().replace(/\s+/g,"");
  return ({artwork:"artwork",readingmost:"most",readingleast:"least",move:"move",place:"place",missing:"missing"})[t]||t;}
function parseMarkdown(md){
  const lines=md.split("\n").filter(l=>l.indexOf("|")>=0);
  const rows=lines.map(l=>{let c=l.split("|");if(c.length&&c[0].trim()==="")c.shift();
    if(c.length&&c[c.length-1].trim()==="")c.pop();return c.map(x=>x.trim());})
    .filter(c=>{const ne=c.some(x=>x!=="");const sep=c.every(x=>x===""||/^:?-+:?$/.test(x));return ne&&!sep;});
  return rowsToRecords(rows);
}
function parseCSV(text){
  const rows=[];let row=[],f="",i=0,q=false;text=text.replace(/\r\n?/g,"\n");
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f="";}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";}else f+=c;}i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rowsToRecords(rows.filter(r=>r.length&&r.some(x=>x.trim()!=="")));
}
const VALID_TYPES=new Set(["artwork","most","least","move","place","missing"]);
function rowsToRecords(rows){
  if(!rows.length)return[];
  // collect any titled reading strings ("Author (Year) — Title") from anywhere (incl. Lists tab / cells)
  TITLES=Object.assign({},READING_TITLES);
  rows.forEach(r=>r.forEach(cell=>{ if(cell&&/\(\d{4}[a-z]?\)\s*—\s*\S/.test(cell)){
    const k=readingKey(cell).toLowerCase(),v=cell.trim(); if(!TITLES[k]||v.length>TITLES[k].length)TITLES[k]=v; }}));
  // find the data header row (has both 'name' and 'rowtype') — robust to a banner,
  // extra columns (e.g. Question), or extra tabs (Read me first / Lists) in the export
  let hi=rows.findIndex(r=>{const s=r.map(x=>x.toLowerCase().trim());return s.includes("name")&&s.includes("rowtype");});
  if(hi<0)hi=0;
  const head=rows[hi].map(h=>h.toLowerCase().trim());
  const I=n=>head.indexOf(n);
  const c={name:I("name"),type:I("rowtype"),item:I("item"),why:I("why"),lat:I("lat"),long:I("long")};
  const g=(r,i)=>(i>=0&&r[i]!=null)?r[i].trim():"";
  return rows.slice(hi+1).map(r=>({name:g(r,c.name),type:toType(g(r,c.type)),item:g(r,c.item),
    why:g(r,c.why),lat:clean(g(r,c.lat)),long:clean(g(r,c.long))}))
    .filter(r=>r.name&&VALID_TYPES.has(r.type));
}

/* ---------- model ---------- */
let PEOPLE=new Map(), ITEMS=new Map(), NODES=[], LINKS=[], byId=new Map();
function key(kind,label){return kind+"::"+label.toLowerCase().replace(/\s+/g," ").trim();}
function build(records){
  PEOPLE=new Map();ITEMS=new Map();NODES=[];LINKS=[];byId=new Map();
  function node(kind,label,extra){
    const id=kind==="person"?"person::"+label:key(kind,label);
    let n=byId.get(id);
    if(!n){n={id,kind,label,x:0,y:0,vx:0,vy:0,deg:0,choosers:new Set(),
      most:new Set(),least:new Set(),whys:[],lat:null,long:null,desc:"",fixed:false,_init:false};
      byId.set(id,n);NODES.push(n);if(kind==="person")PEOPLE.set(label,n);}
    if(extra)Object.assign(n,extra);
    return n;
  }
  // people + their picks
  records.forEach(r=>{ if(!PEOPLE.has(r.name)) node("person",r.name,{picks:{}}); });
  records.forEach(r=>{
    const p=PEOPLE.get(r.name); if(!p)return;
    if(r.type==="move"){
      const m=node("move",r.item.toUpperCase(),{});
      m.choosers.add(r.name); p.picks.move=r.item.toUpperCase(); p.picks.moveWhy=(r.why&&r.why!=="The move I lead with.")?r.why:"";
      if(r.why&&r.why!=="The move I lead with.")m.whys.push({by:r.name,why:r.why});
      LINKS.push({s:p.id,t:m.id,kind:"move",by:r.name,why:r.why,move:r.item.toUpperCase()});
    } else if(r.type==="artwork"){
      const a=node("artwork",r.item,{}); a.choosers.add(r.name); a.whys.push({by:r.name,why:r.why});
      p.picks.artwork=r.item;
      LINKS.push({s:p.id,t:a.id,kind:"artwork",by:r.name,why:r.why});
    } else if(r.type==="most"||r.type==="least"){
      const rd=node("reading",readingKey(r.item),{}); rd.choosers.add(r.name);
      const disp=titleFor(r.item); if(disp.length>rd.label.length)rd.label=disp; // prefer the fullest (titled) form
      if(r.type==="most"){rd.most.add(r.name);p.picks.most=r.item;} else {rd.least.add(r.name);p.picks.least=r.item;}
      rd.whys.push({by:r.name,why:r.why,val:r.type});
      LINKS.push({s:p.id,t:rd.id,kind:r.type,by:r.name,why:r.why});
    } else if(r.type==="place"){
      const pl=node("place",r.name+" · "+r.item,{lat:parseFloat(r.lat),long:parseFloat(r.long),desc:r.why,owner:r.name,placeName:r.item});
      pl.choosers.add(r.name);
      p.picks.place=r.item; p.picks.placeDesc=r.why; p.lat=parseFloat(r.lat); p.long=parseFloat(r.long);
      LINKS.push({s:p.id,t:pl.id,kind:"place",by:r.name,why:r.why});
    } else if(r.type==="missing"){
      const ms=node("missing",r.name+" · "+r.item,{owner:r.name,text:r.item});
      ms.choosers.add(r.name); ms.whys.push({by:r.name,why:r.item});
      p.picks.missing=r.item;
      LINKS.push({s:p.id,t:ms.id,kind:"missing",by:r.name,why:r.item});
    }
  });
  // person's move (for pin colour)
  PEOPLE.forEach(p=>{p.moveOf=p.picks.move||null;});
  recompute();
}
function recompute(){const c=new Map();
  LINKS.forEach(l=>{c.set(l.s,(c.get(l.s)||0)+1);c.set(l.t,(c.get(l.t)||0)+1);});
  NODES.forEach(n=>n.deg=c.get(n.id)||0);}

/* ---------- shared helpers ---------- */
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
const NS="http://www.w3.org/2000/svg";
function mk(t){return document.createElementNS(NS,t);}
const tip=document.getElementById("tooltip");
function showTip(html,e){tip.innerHTML=html;tip.style.opacity=1;moveTip(e);}
function hideTip(){tip.style.opacity=0;}
function moveTip(e){const host=document.getElementById("stage").getBoundingClientRect();
  let x=e.clientX-host.left+14,y=e.clientY-host.top+14;if(x>host.width-260)x=e.clientX-host.left-260;
  tip.style.left=x+"px";tip.style.top=y+"px";}

/* ---------- NETWORK view ---------- */
const svgN=document.getElementById("svgN");
let gN=mk("g"),gNL=mk("g"),gNN=mk("g"),gNT=mk("g"); gN.append(gNL,gNN,gNT); svgN.append(gN);
let viewN={x:0,y:0,k:1};
function applyN(){gN.setAttribute("transform",`translate(${viewN.x},${viewN.y}) scale(${viewN.k})`);}
let WN=1,HN=1; function sizeN(){const r=svgN.getBoundingClientRect();WN=r.width||1000;HN=r.height||600;}
const typeOn=new Set(TYPES.map(t=>t[0]));
const moveOn=new Set(MOVES);
let labelMode="hubs", paused=false, selected=null;
let domN={nodes:new Map(),links:[]};

function radius(n){
  if(n.kind==="move")return 16+Math.min(n.deg,12)*1.4;
  if(n.kind==="person")return 6.5;
  if(n.kind==="reading")return 7+Math.min(n.choosers.size,8)*2.2;
  if(n.kind==="artwork")return 6+Math.min(n.choosers.size,8)*2.4;
  return 5.5; // place/missing leaves
}
function moveAnchor(i){const a=(i/MOVES.length)*Math.PI*2-Math.PI/2;
  return {x:WN/2+Math.cos(a)*Math.min(WN,HN)*0.33, y:HN/2+Math.sin(a)*Math.min(WN,HN)*0.33};}

function renderNetwork(){
  sizeN(); gNL.innerHTML="";gNN.innerHTML="";gNT.innerHTML="";
  domN={nodes:new Map(),links:[]};
  NODES.forEach((n,i)=>{ if(!n._init){
    if(n.kind==="move"){const mi=MOVES.indexOf(n.label);const a=moveAnchor(mi<0?i:mi);n.x=a.x;n.y=a.y;}
    else{const a=i/NODES.length*Math.PI*2;n.x=WN/2+Math.cos(a)*Math.min(WN,HN)*0.28;n.y=HN/2+Math.sin(a)*Math.min(WN,HN)*0.28;}
    n._init=true;}});
  LINKS.forEach(l=>{const el=mk("line");el.setAttribute("stroke",TYPE_COLOR[l.kind]||"#bbb");
    el.setAttribute("stroke-width",l.kind==="move"?1.8:1.3);
    el.setAttribute("stroke-opacity",l.kind==="missing"?0.4:0.55);
    if(l.kind==="missing")el.setAttribute("stroke-dasharray","2 3");
    gNL.append(el);domN.links.push({el,l});});
  NODES.forEach(n=>{
    const g=mk("g");g.style.cursor="pointer";
    if(n.kind==="reading"){ // two-tone contested node
      const r=radius(n),mostN=n.most.size,leastN=n.least.size,tot=mostN+leastN||1;
      const base=mk("circle");base.setAttribute("r",r);base.setAttribute("fill",mostN>=leastN?"#3f8f7d":"#d1553b");
      base.setAttribute("stroke","#fff");base.setAttribute("stroke-width",1.4);g.append(base);
      if(mostN>0&&leastN>0){const frac=leastN/tot;g.append(wedge(r,frac,"#d1553b"));
        const b2=mk("circle");b2.setAttribute("r",r);b2.setAttribute("fill","none");b2.setAttribute("stroke","#fff");b2.setAttribute("stroke-width",1.4);g.append(b2);}
    } else {
      const c=mk("circle");c.setAttribute("r",radius(n));
      if(n.kind==="missing"){c.setAttribute("fill","#f6f1e7");c.setAttribute("stroke",TYPE_COLOR.missing);
        c.setAttribute("stroke-dasharray","2 3");c.setAttribute("stroke-width",1.5);}
      else{c.setAttribute("fill",fillOf(n));c.setAttribute("stroke","#fff");c.setAttribute("stroke-width",1.4);}
      g.append(c);
    }
    gNN.append(g);
    const lbl=mk("text");lbl.setAttribute("font-size",n.kind==="move"?13:11);
    lbl.setAttribute("fill","#2b2622");lbl.setAttribute("text-anchor","middle");
    lbl.setAttribute("paint-order","stroke");lbl.setAttribute("stroke","#f6f1e7");lbl.setAttribute("stroke-width",3);
    lbl.setAttribute("font-weight",n.kind==="move"?"700":"400");
    lbl.textContent=n.kind==="move"?n.label:shortLabel(n);
    gNT.append(lbl);
    domN.nodes.set(n.id,{g,lbl,n});
    g.addEventListener("mouseenter",e=>hoverNode(n,e));
    g.addEventListener("mousemove",moveTip);
    g.addEventListener("mouseleave",hideTip);
    g.addEventListener("pointerdown",e=>{e.stopPropagation();if(e.shiftKey)return;startDragN(n,e);});
    g.addEventListener("click",e=>{e.stopPropagation();select(n.id);});
  });
  applyFilterN(); updateLabelsN();
}
function wedge(r,frac,color){const a0=-Math.PI/2,a1=a0+frac*Math.PI*2;
  const x0=r*Math.cos(a0),y0=r*Math.sin(a0),x1=r*Math.cos(a1),y1=r*Math.sin(a1);
  const large=frac>0.5?1:0;const p=mk("path");
  p.setAttribute("d",`M0 0 L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`);
  p.setAttribute("fill",color);return p;}
function fillOf(n){
  if(n.kind==="person")return n.moveOf?MOVE_COLOR[n.moveOf]:"#2b2622";
  if(n.kind==="move")return MOVE_COLOR[n.label]||"#7d5aa6";
  if(n.kind==="artwork")return "#b8742a";
  if(n.kind==="place")return "#3b6ea5";
  return "#999";
}
function shortLabel(n){
  if(n.kind==="person")return n.label;
  if(n.kind==="artwork")return n.label.split(" — ")[0];
  if(n.kind==="reading")return readingKey(n.label);
  if(n.kind==="place")return n.placeName||"";
  if(n.kind==="missing")return "";
  return n.label;
}
let dragN=null;
function startDragN(n,e){const p=toGraphN(e);dragN={n,dx:n.x-p.x,dy:n.y-p.y};n.fixed=true;}
function toGraphN(e){const r=svgN.getBoundingClientRect();return{x:(e.clientX-r.left-viewN.x)/viewN.k,y:(e.clientY-r.top-viewN.y)/viewN.k};}
window.addEventListener("pointermove",e=>{if(dragN){const p=toGraphN(e);dragN.n.x=p.x+dragN.dx;dragN.n.y=p.y+dragN.dy;dragN.n.vx=0;dragN.n.vy=0;e.preventDefault();}},{passive:false});
window.addEventListener("pointerup",()=>{if(dragN){dragN.n.fixed=false;dragN=null;}});
// unified pan / pinch-zoom / wheel for mouse + touch (pointer events)
function makePanZoom(svg,view,apply,onBg){
  const pts=new Map();let pan=null,pinch=null;
  const isBg=t=>t===svg||t.tagName==="path"||t.tagName==="line";
  svg.addEventListener("pointerdown",e=>{
    if(!isBg(e.target))return;
    pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pts.size===1){pan={x:e.clientX-view.x,y:e.clientY-view.y};svg.classList.add("grabbing");if(onBg)onBg();}
    else if(pts.size===2){pan=null;const[a,b]=[...pts.values()];pinch={d:Math.hypot(a.x-b.x,a.y-b.y)||1,mx:(a.x+b.x)/2,my:(a.y+b.y)/2,vx:view.x,vy:view.y,vk:view.k};}
  });
  window.addEventListener("pointermove",e=>{
    if(pts.has(e.pointerId))pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinch&&pts.size>=2){const[a,b]=[...pts.values()];const s=Math.hypot(a.x-b.x,a.y-b.y)/pinch.d;
      const r=svg.getBoundingClientRect(),mx=pinch.mx-r.left,my=pinch.my-r.top;
      view.k=pinch.vk*s;view.x=mx-(mx-pinch.vx)*s;view.y=my-(my-pinch.vy)*s;apply();e.preventDefault();return;}
    if(pan){view.x=e.clientX-pan.x;view.y=e.clientY-pan.y;apply();}
  },{passive:false});
  function end(e){pts.delete(e.pointerId);if(pts.size<2)pinch=null;if(pts.size===0){pan=null;svg.classList.remove("grabbing");}}
  window.addEventListener("pointerup",end);window.addEventListener("pointercancel",end);
  svg.addEventListener("wheel",e=>{e.preventDefault();const s=Math.exp(-e.deltaY*0.0012);
    const r=svg.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
    view.x=mx-(mx-view.x)*s;view.y=my-(my-view.y)*s;view.k*=s;apply();},{passive:false});
}
makePanZoom(svgN,viewN,applyN,clearSelect);

function hoverNode(n,e){
  let html="";
  if(n.kind==="person"){const p=n.picks||{};
    html=`<div class="t-item">${escapeHtml(n.label)}</div><div class="t-sub">leads with ${p.move||"—"} · click to see their block</div>`;}
  else if(n.kind==="move"){html=`<div class="t-item">${n.label}</div><div class="t-sub">${n.choosers.size} lead with this move</div>`;}
  else if(n.kind==="artwork"){html=`<div class="t-item">${escapeHtml(n.label)}</div><div class="t-sub">artwork · chosen by ${n.choosers.size}</div>`;}
  else if(n.kind==="reading"){html=`<div class="t-item">${escapeHtml(n.label)}</div><div class="t-sub"><span style="color:#3f8f7d">most×${n.most.size}</span> · <span style="color:#d1553b">least×${n.least.size}</span></div>`;}
  else if(n.kind==="place"){html=`<div class="t-item">${escapeHtml(n.placeName)}</div><div class="t-sub">${escapeHtml(n.owner)}</div><div class="t-why">${escapeHtml(n.desc)}</div>`;}
  else if(n.kind==="missing"){html=`<div class="t-item">${escapeHtml(n.text)}</div><div class="t-sub">${escapeHtml(n.owner)} · absence</div>`;}
  showTip(html,e);
}

/* filters + labels + selection dimming */
function linkVisible(l){ if(!typeOn.has(l.kind))return false;
  const p=byId.get(l.s); const person=p&&p.kind==="person"?p:byId.get(l.t);
  if(person&&person.moveOf&&!moveOn.has(person.moveOf))return false; return true;}
function nodeVisibleN(n){
  if(n.kind==="move")return typeOn.has("move")&&moveOn.has(n.label);
  if(n.kind==="person")return !n.moveOf||moveOn.has(n.moveOf);
  return LINKS.some(l=>(l.s===n.id||l.t===n.id)&&linkVisible(l));
}
function applyFilterN(){
  domN.links.forEach(({el,l})=>el.style.display=linkVisible(l)?"":"none");
  domN.nodes.forEach(({g,lbl,n})=>{const v=nodeVisibleN(n);g.style.display=v?"":"none";lbl.style.display=v?"":"none";});
  updateLabelsN(); applySelectionDim();
}
function updateLabelsN(){
  domN.nodes.forEach(({g,lbl,n})=>{ let show=true;
    if(labelMode==="hubs")show=n.kind==="move"||n.kind==="person"||(n.kind==="reading"&&n.choosers.size>=2)||(n.kind==="artwork"&&n.choosers.size>=2);
    else if(labelMode==="none")show=false;
    if(g.style.display==="none")show=false;
    lbl.style.display=show?"":"none"; });
}
function neighborsOf(id){const set=new Set([id]);LINKS.forEach(l=>{if(l.s===id)set.add(l.t);if(l.t===id)set.add(l.s);});return set;}
function applySelectionDim(){
  if(!selected){domN.nodes.forEach(({g})=>g.style.opacity="");domN.links.forEach(({el})=>el.style.opacity=el.style.display==="none"?"":"");return;}
  const nb=neighborsOf(selected);
  domN.nodes.forEach(({g,n})=>{ if(g.style.display==="none")return; g.style.opacity=nb.has(n.id)?"1":"0.12";});
  domN.links.forEach(({el,l})=>{ if(el.style.display==="none")return; el.style.opacity=(l.s===selected||l.t===selected)?"0.9":"0.06";});
}

/* force sim (network) */
function tickN(){
  if(activeTab==="network"&&!paused&&NODES.length){
    const cx=WN/2,cy=HN/2;
    for(let i=0;i<NODES.length;i++){const a=NODES[i];
      for(let j=i+1;j<NODES.length;j++){const b=NODES[j];
        let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy+0.01;
        const rep=(radius(a)+radius(b))*60;const f=rep/d2;const d=Math.sqrt(d2);
        const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}}
    LINKS.forEach(l=>{const a=byId.get(l.s),b=byId.get(l.t);if(!a||!b)return;
      if(!linkVisible(l))return; // hidden connections don't pull (e.g. lead move toggled off)
      let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)+0.01;
      const target=l.kind==="move"?90:l.kind==="place"||l.kind==="missing"?70:120;
      const f=(d-target)*0.02;const fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
    const moveStruct=typeOn.has("move");
    NODES.forEach((n,i)=>{
      if(n.kind==="move"){ if(moveStruct){const mi=MOVES.indexOf(n.label);const a=moveAnchor(mi);n.vx+=(a.x-n.x)*0.05;n.vy+=(a.y-n.y)*0.05;} }
      else{n.vx+=(cx-n.x)*0.002;n.vy+=(cy-n.y)*0.002;}
    });
    NODES.forEach(n=>{if(n.fixed){n.vx=0;n.vy=0;return;}
      n.vx*=0.85;n.vy*=0.85;n.vx=Math.max(-25,Math.min(25,n.vx));n.vy=Math.max(-25,Math.min(25,n.vy));
      n.x+=n.vx;n.y+=n.vy;});
  }
  drawN();requestAnimationFrame(tickN);
}
function drawN(){
  domN.links.forEach(({el,l})=>{const a=byId.get(l.s),b=byId.get(l.t);if(!a||!b)return;
    el.setAttribute("x1",a.x);el.setAttribute("y1",a.y);el.setAttribute("x2",b.x);el.setAttribute("y2",b.y);});
  domN.nodes.forEach(({g,lbl,n})=>{g.setAttribute("transform",`translate(${n.x},${n.y})`);
    lbl.setAttribute("x",n.x);lbl.setAttribute("y",n.y-radius(n)-4);});
}

const WORLD=JSON.parse(document.getElementById("world").textContent||"[]");
function proj(lon,lat){return {x:(lon+180)/360*WM, y:(90-lat)/180*HM};}

function renderMap(){
  sizeM(); gMland.innerHTML="";gMpins.innerHTML="";pinEls=new Map();

  WORLD.forEach(cty=>{ let d="";
    cty.forEach(poly=>{ poly.forEach(ring=>{
      for(let i=0;i<ring.length;i+=2){const p=proj(ring[i]/10,ring[i+1]/10);d+=(i===0?"M":"L")+p.x.toFixed(1)+" "+p.y.toFixed(1);}

    l.setAttribute("x1",a.x);l.setAttribute("y1",a.y);l.setAttribute("x2",b.x);l.setAttribute("y2",b.y);

    const c=mk("circle");c.setAttribute("r",5.5);c.setAttribute("fill",p.moveOf?MOVE_COLOR[p.moveOf]:"#2b2622");
    c.setAttribute("stroke","#fff");c.setAttribute("stroke-width",1.5);g.append(c);

    g.addEventListener("mousemove",moveTip);g.addEventListener("mouseleave",hideTip);
    g.addEventListener("click",e=>{e.stopPropagation();select(p.id);});

function fitMap(){
  const pts=[];PEOPLE.forEach(p=>{if(isFinite(p.lat)&&isFinite(p.long))pts.push(proj(p.long,p.lat));});
  if(!pts.length)return;
  let x0=Math.min(...pts.map(p=>p.x)),x1=Math.max(...pts.map(p=>p.x));
  let y0=Math.min(...pts.map(p=>p.y)),y1=Math.max(...pts.map(p=>p.y));
  const pad=60;x0-=pad;y0-=pad;x1+=pad;y1+=pad;
  const bw=Math.max(x1-x0,40),bh=Math.max(y1-y0,40);
  const k=Math.min(WM/bw,HM/bh,6);
  viewM.k=k;viewM.x=WM/2-((x0+x1)/2)*k;viewM.y=HM/2-((y0+y1)/2)*k;applyM();
}

/* ---------- guided tour ---------- */
let tourStep=-1, tourMe=null, TOUR=[], tourNotes={}, tourChoices={};
function haversine(a,b){const R=6371,d=Math.PI/180;
  const dLat=(b.lat-a.lat)*d,dLon=(b.long-a.long)*d;
  const s=Math.sin(dLat/2)**2+Math.cos(a.lat*d)*Math.cos(b.lat*d)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));}
function mePerson(){return tourMe?PEOPLE.get(tourMe):null;}
function contestedReading(){let best=null,bs=-1;NODES.forEach(n=>{if(n.kind!=="reading")return;
  const sc=Math.min(n.most.size,n.least.size)*100+n.most.size+n.least.size;if(sc>bs){bs=sc;best=n;}});return best;}
function otherMovePerson(){const me=mePerson();
  let c=[...PEOPLE.values()].filter(p=>p.moveOf);
  if(me&&me.moveOf) c=c.filter(p=>p!==me&&p.moveOf!==me.moveOf);
  return c.length?c[Math.floor(Math.random()*c.length)]:null;}
function anAbsence(){const a=NODES.filter(n=>n.kind==="missing");return a.length?a[Math.floor(a.length/2)]:null;}
function furthestPerson(){const me=mePerson();if(!me||!isFinite(me.lat))return null;let best=null,bd=-1;
  PEOPLE.forEach(p=>{if(p===me||!isFinite(p.lat))return;const dd=haversine(me,p);if(dd>bd){bd=dd;best={p,d:dd};}});return best;}
function placeCount(){let c=0;PEOPLE.forEach(p=>{if(isFinite(p.lat))c++;});return c;}
function diffMoveOptions(){const me=mePerson();let c=[...PEOPLE.values()].filter(p=>p.moveOf);
  if(me&&me.moveOf)c=c.filter(p=>p!==me&&p.moveOf!==me.moveOf);
  return c.sort((a,b)=>a.label.localeCompare(b.label)).map(p=>({label:`${p.label} · ${p.moveOf}`,nodeId:p.id}));}
function contestedOptions(){let r=NODES.filter(n=>n.kind==="reading"&&n.most.size>0&&n.least.size>0);
  if(!r.length)r=NODES.filter(n=>n.kind==="reading");
  return r.sort((a,b)=>(b.most.size+b.least.size)-(a.most.size+a.least.size))
    .map(n=>({label:`${readingKey(n.label)} — most ${n.most.size} / least ${n.least.size}`,nodeId:n.id}));}
function absenceOptions(){return NODES.filter(n=>n.kind==="missing")
  .sort((a,b)=>(a.owner||"").localeCompare(b.owner||""))
  .map(n=>({label:`${n.text} — ${n.owner}`,nodeId:n.id}));}
function placeOptions(){const me=mePerson(),out=[];
  const others=[...PEOPLE.values()].filter(p=>isFinite(p.lat)&&p!==me);
  if(me&&isFinite(me.lat)){others.map(p=>({p,d:haversine(me,p)})).sort((a,b)=>b.d-a.d)
    .forEach(x=>out.push({label:`${x.p.picks.place} · ${x.p.label} (${Math.round(x.d).toLocaleString()} km)`,nodeId:x.p.id}));}
  else{others.sort((a,b)=>a.label.localeCompare(b.label))
    .forEach(p=>out.push({label:`${p.picks.place} · ${p.label}`,nodeId:p.id}));}
  return out;}
function buildTourSteps(){
  const me=mePerson(), steps=[];
  const chooser=(id,key,opts)=>`<select id="${id}" class="tour-choose" data-key="${key}"><option value="">— choose one —</option>${opts.map(o=>`<option value="${escapeHtml(o.nodeId)}">${escapeHtml(o.label)}</option>`).join("")}</select>`;
  const think=t=>`<div class="tc-think">${t}</div>`;
  const note=key=>`<textarea class="tour-note" data-key="${key}" placeholder="Jot a line to keep for your response…"></textarea>`;
  steps.push({step:"Start",title:"Take a short walk",
    body:`This is ETEC 531 as the cohort lived it — and it lands harder if you walk it as yourself. Which one is you?<br><select id="tourWho"><option value="">— skip —</option>${[...PEOPLE.keys()].sort().map(n=>`<option ${n===tourMe?"selected":""}>${escapeHtml(n)}</option>`).join("")}</select>`,
    onShow:()=>clearSelect()});
  steps.push({step:"A different vantage",title:"Choose a different move",
    body:`Pick a classmate who leads with a <b>different move</b> than you.`+chooser("chMove","move",diffMoveOptions())+think(`Read their why. What does leading with their move let them notice that yours doesn't?`)+note("move")});
  steps.push({step:"A disagreement",title:"Choose a contested reading",
    body:`These readings split the room — essential to some, set aside by others. Choose one to sit with.`+chooser("chRead","reading",contestedOptions())+think(`Read both sides. Which camp are you in — and what would change your mind?`)+note("reading")});
  steps.push({step:"An absence",title:"Choose an absence",
    body:`Every student named something the course was missing. Choose one that matters to you.`+chooser("chAbs","absence",absenceOptions())+think(`Why does this absence matter? What would including it change about the course?`)+note("absence")});
  steps.push({step:"The wider room",title:"Choose a distant place",
    body:`On the map, choose a place far from your own.`+chooser("chPlace","place",placeOptions())+think(`What does it mean that this place is part of the same course as yours?`)+note("place"),
    onShow:()=>{setTab("places");document.querySelector('#tabs [data-tab=places]').classList.add("active");document.querySelector('#tabs [data-tab=network]').classList.remove("active");}});
  steps.push({step:"Your turn",title:"What will you carry back?",
    body:`You've made four choices and sat with each. Now press <b>Respond</b> (top bar) and write a few lines.`});
  return steps;
}
function showTourStep(i){
  TOUR=buildTourSteps();
  if(i<0||i>=TOUR.length){endTour();return;}
  tourStep=i; const s=TOUR[i];
  document.getElementById("tcStep").textContent=`${i+1} / ${TOUR.length} · ${s.step}`;
  document.getElementById("tcTitle").innerHTML=s.title;
  document.getElementById("tcBody").innerHTML=s.body;
  document.getElementById("tourCard").classList.remove("hidden");
  document.getElementById("tcBack").style.visibility=i===0?"hidden":"visible";
  document.getElementById("tcNext").textContent=i===TOUR.length-1?"Done":"Next";
  const who=document.getElementById("tourWho"); if(who)who.addEventListener("change",e=>{tourMe=e.target.value||null;});
  document.querySelectorAll("#tcBody select.tour-choose").forEach(sc=>sc.addEventListener("change",e=>{
    if(e.target.value){select(e.target.value);const k=e.target.getAttribute("data-key");if(k)tourChoices[k]=e.target.options[e.target.selectedIndex].text;}}));
  document.querySelectorAll("#tcBody textarea.tour-note").forEach(t=>{const k=t.getAttribute("data-key");
    if(k&&tourNotes[k])t.value=tourNotes[k]; t.addEventListener("input",e=>{tourNotes[k]=e.target.value;});});
  if(s.onShow){try{s.onShow();}catch(err){}}
}
function endTour(){document.getElementById("tourCard").classList.add("hidden");tourStep=-1;}
function resetCardPos(){const c=document.getElementById("tourCard");c.style.left="50%";c.style.top="auto";c.style.bottom="18px";c.style.transform="translateX(-50%)";}
document.getElementById("tourBtn").addEventListener("click",()=>{resetCardPos();tourMe=(selected&&selected.indexOf("person::")===0)?selected.slice(8):tourMe;showTourStep(0);});
document.getElementById("tcNext").addEventListener("click",()=>{const who=document.getElementById("tourWho");if(who)tourMe=who.value||null;showTourStep(tourStep+1);});
document.getElementById("tcBack").addEventListener("click",()=>showTourStep(tourStep-1));
document.getElementById("tcClose").addEventListener("click",endTour);
/* draggable callout — move it to see behind it */
(function(){const card=document.getElementById("tourCard"),h=document.getElementById("tcDrag");let dr=null;
  h.addEventListener("pointerdown",e=>{const r=card.getBoundingClientRect(),pr=(card.offsetParent||document.body).getBoundingClientRect();
    dr={dx:e.clientX-r.left,dy:e.clientY-r.top,pl:pr.left,pt:pr.top};card.style.transform="none";card.style.bottom="auto";e.preventDefault();});
  window.addEventListener("pointermove",e=>{if(!dr)return;card.style.left=Math.max(0,e.clientX-dr.dx-dr.pl)+"px";card.style.top=Math.max(0,e.clientY-dr.dy-dr.pt)+"px";e.preventDefault();},{passive:false});
  window.addEventListener("pointerup",()=>{dr=null;});})();

/* ---------- respond / reflection ---------- */
const respondDlg=document.getElementById("respondDlg");
let respTouched=false;
function respondTemplate(){
  const who=tourMe||(selected&&selected.indexOf("person::")===0?selected.slice(8):"");
  const wp={move:"A classmate who leads with a different move",reading:"A contested reading",absence:"An absence that matters to me",place:"A place far from mine"};
  let walk="";
  ["move","reading","absence","place"].forEach(k=>{const ch=(tourChoices[k]||"").trim(),nt=(tourNotes[k]||"").trim();
    if(ch||nt)walk+="• "+wp[k]+(ch?" — "+ch:"")+"\n  "+(nt||"…")+"\n";});
  let out="Dear Data, ETEC 531 — my response to the map"+(who?"\n("+who+")":"")+"\n\n";
  if(walk)out+="FROM THE WALK\n"+walk+"\n";
  out+="RETURN TO THE MAP — complete your response below\n\n"+
    "What sits at the centre that surprised you?\n\n\n"+
    "What's at the edge that should be central?\n\n\n"+
    "Which absence would you most want the course to address — and why?\n\n";
  return out;
}
document.getElementById("respondBtn").addEventListener("click",()=>{
  const t=document.getElementById("rdMain"); if(!respTouched)t.value=respondTemplate();
  try{respondDlg.showModal();}catch(e){respondDlg.setAttribute("open","");} t.focus();
});
document.getElementById("rdMain").addEventListener("input",()=>{respTouched=true;});
document.getElementById("rdClose").addEventListener("click",()=>respondDlg.close());
document.getElementById("rdCopy").addEventListener("click",()=>{const t=document.getElementById("rdMain");
  t.focus();t.select(); if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t.value).catch(()=>{});});
document.getElementById("rdDownload").addEventListener("click",()=>{const t=document.getElementById("rdMain").value;
  const b=new Blob([t],{type:"text/plain"});const u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download="dear-data-response.txt";a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);});

window.addEventListener("resize",()=>{sizeN();if(activeTab==="places"&&mapBuilt){sizeM();fitMap();}});
requestAnimationFrame(tickN);
load();
</script>
